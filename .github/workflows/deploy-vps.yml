# Деплой на VPS после push в main (см. docs/vps-nginx-operations.md).
#
# Секреты в репозитории GitHub → Settings → Secrets and variables → Actions:
#   VPS_HOST       — например 45.153.191.22
#   VPS_USER       — deploy
#   VPS_SSH_KEY    — только приватный ключ (файл без .pub), целиком BEGIN…END, без кавычек и лишних пробелов
#
# На сервере у пользователя deploy нужен доступ к `git fetch` (deploy key или HTTPS + credential).
# Рабочая копия совпадает с origin/main (`checkout -B main origin/main`), локальные правки в отслеживаемых файлах сбрасываются.

name: Deploy Strapi to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest 
    steps:
      - name: SSH — pull, build, pm2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            . "$HOME/.nvm/nvm.sh"
            cd /var/www/pantera-mini-apps-admin
            if [ -f .tmp/data.db ]; then
              mkdir -p backups
              cp .tmp/data.db "backups/data-$(date +%F-%H%M).db"
            fi
            git fetch origin
            git checkout -B main origin/main
            nvm install
            nvm use
            npm ci
            export NODE_OPTIONS=--max-old-space-size=3072
            NODE_ENV=production npm run build
            # restart падает с «not found», если процесса ещё не было — тогда первый запуск
            pm2 restart pantera-admin --update-env || pm2 start ./node_modules/.bin/strapi --name pantera-admin --cwd /var/www/pantera-mini-apps-admin -- start
            pm2 save
