meta:
  environment: nodejs
  toolchain:
    name: npm
    version: 20

build:
  context: strapi-cms
  skip: false
  command: npm install
  additionalCommands: npm run build
  artifacts:
    "*": /

run:
  command: npm run start
  persistence:
    - mountPath: /app/public/uploads
      name: uploads-data
  persistenceMount: /data
  containerPort: "80"
  servicePort: "80"
      
